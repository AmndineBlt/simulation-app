<div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm">
  <div class="bg-surface border border-border rounded-xl p-8 text-center max-w-sm w-full mx-4">

    <div class="w-16 h-16 rounded-full border border-border flex items-center justify-center mx-auto mb-6">
      @if (reason === 'ALL ANIMALS HAVE PERISHED') {
        <lucide-icon [img]="Skull" [size]="32" class="text-danger"/>
      } @else {
        <lucide-icon [img]="Grid2x2" [size]="32" class="text-primary"/>
      }
    </div>

    <p class="text-2xl font-bold text-primary tracking-widest mb-2">SIMULATION OVER</p>
    <p class="text-text-muted text-xs tracking-wider mb-6">{{ reason }}</p>

    <div class="bg-surface-dark rounded-lg p-4 mb-6 text-left">
      <p class="text-xs text-text-muted tracking-widest mb-3">FINAL STATS</p>
      <div class="flex flex-col gap-2 text-xs">
        <div class="flex justify-between">
          <span class="text-text-muted">TICKS SURVIVED</span>
          <span class="text-primary">{{ rabbitHistory.length }}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-rabbit">PEAK RABBITS</span>
          <span class="text-rabbit">{{ maxOf(rabbitHistory) }}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-wolf">PEAK WOLVES</span>
          <span class="text-wolf">{{ maxOf(wolfHistory) }}</span>
        </div>
      </div>
    </div>

    <button (click)="restarted.emit()"
            class="flex items-center justify-center gap-2 w-full px-6 py-3 border border-primary text-primary rounded hover:bg-primary hover:text-surface-dark transition-all cursor-pointer tracking-widest text-sm">
      <lucide-icon [img]="RotateCcw" [size]="15"/>
      RESTART
    </button>
  </div>
</div>
