<div class="min-h-screen bg-surface-dark text-white p-4 md:p-6 font-mono">
  @if (isSimulationOver()) {
    <app-simulation-over
      (restarted)="restart()"
      [rabbitHistory]="rabbitHistory()"
      [reason]="simulationOverReason()"
      [wolfHistory]="wolfHistory()"
    />
  }
  <!-- Header -->
  <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-xl md:text-2xl font-bold tracking-widest text-primary">SIMULATION</h1>
      <p class="text-xs text-text-muted tracking-wider mt-1">ÉCOSYSTÈME PRÉDATEUR / PROIE</p>
    </div>
    <app-simulation-controls
      (pauseToggled)="togglePause()"
      (restarted)="restart()"
      (speedChanged)="changeSpeed($event)"
      [isPaused]="isPaused()"
      [speed]="speed()"
    />
  </div>

  <!-- Main content -->
  <div class="flex flex-col xl:flex-row gap-6">
    <!-- Colonne gauche — Grille -->
    <app-simulation-grid [grid]="grid()"/>
    <!-- Colonne centrale — Stats + Graphique -->
    <div class="flex flex-col gap-4 flex-1 min-w-0">
      <!-- Stats -->
      <app-simulation-stats
        [carrots]="carrotHistory()[carrotHistory().length - 1] || 0"
        [rabbits]="rabbitHistory()[rabbitHistory().length - 1] || 0"
        [wolves]="wolfHistory()[wolfHistory().length - 1] || 0"
      />
      <!-- Graphique -->
      <app-simulation-chart
        [carrots]="carrotHistory()"
        [rabbits]="rabbitHistory()"
        [wolves]="wolfHistory()"
      />
    </div>
    <!-- Colonne droite — Configuration -->
    <div class="w-full xl:w-72 shrink-0">
      <app-simulation-config (configChanged)="updateConfig($event)"/>
    </div>
  </div>
</div>
