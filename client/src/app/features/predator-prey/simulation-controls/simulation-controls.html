<div class="flex flex-wrap items-center gap-3">
  <div class="flex items-center gap-3">
    <p class="text-xs text-text-muted tracking-widest">SPEED</p>
    <input (input)="onSpeedChange($event)" [value]="speed"
           class="w-24 accent-primary" max="2000" min="200" step="200" type="range">
    <p class="text-xs text-primary w-12">{{ speed }}ms</p>
  </div>
  <button (click)="pauseToggled.emit()"
          [ngClass]="isPaused
    ? 'border-primary text-primary hover:bg-primary hover:text-surface-dark'
    : 'border-pause text-pause hover:bg-pause hover:text-surface-dark'"
          class="flex items-center gap-2 px-4 py-2 text-sm tracking-wider border rounded transition-all cursor-pointer">
    @if (isPaused) {
      <lucide-icon [img]="Play" [size]="15"/>
      RESUME
    } @else {
      <lucide-icon [img]="Pause" [size]="15"/>
      PAUSE
    }
  </button>
  <button (click)="onRestart()"
          class="flex items-center gap-2 px-4 py-2 text-sm tracking-wider border border-danger text-danger rounded hover:bg-danger hover:text-surface-dark transition-all cursor-pointer">
    <lucide-icon [class.spin-once]="isRestarting" [img]="RotateCcw" [size]="15"/>
    RESTART
  </button>
</div>
