<div class="min-h-screen bg-surface-dark text-white p-4 md:p-6 font-mono">
  <div class="mb-12">
    <h1 class="text-3xl md:text-4xl font-bold tracking-widest text-primary">SIMULATIONS</h1>
    <p class="text-xs text-text-muted tracking-wider mt-2">SELECT A SIMULATION TO RUN</p>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (simulation of simulations; track simulation.number) {
      <app-simulation-card [simulation]="simulation"/>
    }
  </div>
</div>
