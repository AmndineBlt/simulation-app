<div class="bg-surface border border-border rounded-xl p-3 md:p-4">
  <p class="text-xs text-text-muted tracking-widest mb-1">{{ label }}</p>
  <p [ngClass]="{
       'text-rabbit': color === 'rabbit',
       'text-wolf': color === 'wolf',
       'text-carrot': color === 'carrot'
     }"
     class="text-2xl md:text-3xl font-bold">
    {{ value }}
  </p>
</div>
