<nav class="bg-surface border-b border-border px-4 md:px-6 py-3 font-mono">
  <div class="flex items-center justify-between">
    <a class="text-primary font-bold tracking-widest hover:text-primary-hover transition-colors" routerLink="/">
      HUB
    </a>
    @for (simulation of simulations; track simulation.number) {
      @if (isActive(simulation.route)) {
        <span class="text-xs text-text-muted tracking-widest">{{ simulation.title }}</span>
      }
    }
  </div>
</nav>
